name: Build 60s hero video

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-60s-hero-video.yml

permissions:
  contents: write

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build 60s white-fade hero loop
        run: |
          set -euo pipefail
          ffmpeg -version
          ffmpeg -y \
            -stream_loop 1 \
            -i assets/starry-signal-hero-loop-40s.mp4 \
            -t 60 \
            -an \
            -vf "fade=t=out:st=54:d=6:color=white" \
            -c:v libx264 \
            -preset veryslow \
            -crf 35 \
            -pix_fmt yuv420p \
            -movflags +faststart \
            assets/starry-signal-hero-loop-60s-white-fade.mp4
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          text = text.replace('assets/starry-signal-hero-loop-40s.mp4', 'assets/starry-signal-hero-loop-60s-white-fade.mp4')
          path.write_text(text)
          PY
          git rm .github/workflows/build-60s-hero-video.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/starry-signal-hero-loop-60s-white-fade.mp4
          git commit -m "Add 60s white-fade hero video"
          git push
